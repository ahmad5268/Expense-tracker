name: Flutter CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'

jobs:
  analyze-test-build:
    name: Analyze, Test & Build Web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      # Write firebase_options.dart — use secret if set, otherwise stub for CI
      - name: Write firebase_options.dart
        run: |
          mkdir -p lib
          if [ -n "${{ secrets.FIREBASE_OPTIONS_DART }}" ]; then
            echo "${{ secrets.FIREBASE_OPTIONS_DART }}" > lib/firebase_options.dart
          else
            cat > lib/firebase_options.dart << 'STUB'
          // Auto-generated stub for CI — replace with real flutterfire output for production
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return web;
            }
            static const FirebaseOptions web = FirebaseOptions(
              apiKey: 'stub',
              appId: 'stub',
              messagingSenderId: 'stub',
              projectId: 'stub',
            );
          }
          STUB
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run unit + widget tests
        run: flutter test --coverage --reporter=github

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: apps/mobile/coverage

      - name: Build web
        run: flutter build web --release --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.expensetracker.app' }}
