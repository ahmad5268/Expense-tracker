name: Flutter CD

on:
  workflow_run:
    workflows: [Flutter CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-web:
    name: Build & Deploy Flutter Web to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Write firebase_options.dart
        run: |
          mkdir -p lib
          if [ -n "${{ secrets.FIREBASE_OPTIONS_DART }}" ]; then
            echo "${{ secrets.FIREBASE_OPTIONS_DART }}" > lib/firebase_options.dart
          else
            cat > lib/firebase_options.dart << 'STUB'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => web;
            static const FirebaseOptions web = FirebaseOptions(apiKey: 'stub', appId: 'stub', messagingSenderId: 'stub', projectId: 'stub');
          }
          STUB
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Flutter web
        run: flutter build web --release --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.expensetracker.app' }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        run: |
          vercel deploy build/web \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --prod \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
