name: API CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: expense_tracker_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/expense_tracker_test
      REDIS_URL: redis://localhost:6379
      SENDGRID_API_KEY: SG.test
      SENDGRID_FROM_EMAIL: noreply@test.com
      FIREBASE_SERVICE_ACCOUNT: '{}'
      GOOGLE_CLIENT_ID: not-configured
      GOOGLE_CLIENT_SECRET: not-configured
      GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
      APPLE_CLIENT_ID: not-configured
      APPLE_TEAM_ID: not-configured
      APPLE_KEY_ID: not-configured
      APPLE_PRIVATE_KEY: not-configured
      APPLE_CALLBACK_URL: http://localhost:3000/auth/apple/callback
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Generate fresh RSA keys so JWT_PRIVATE_KEY / JWT_PUBLIC_KEY secrets are optional
      - name: Generate JWT keys for CI
        run: |
          openssl genrsa -out /tmp/jwt_private.pem 2048 2>/dev/null
          echo "JWT_PRIVATE_KEY=$(cat /tmp/jwt_private.pem | base64 -w 0)" >> $GITHUB_ENV
          echo "JWT_PUBLIC_KEY=$(openssl rsa -in /tmp/jwt_private.pem -pubout 2>/dev/null | base64 -w 0)" >> $GITHUB_ENV

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm run test -- --coverage --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: apps/api/coverage
