name: expense_tracker
description: Multi-user monthly expense tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP + WebSocket
  dio: ^5.4.3
  socket_io_client: ^2.0.3+1

  # Token storage (platform-aware)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Data models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^0.68.0

  # Firebase (push notifications)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation (riverpod_generator + custom_lint added in fl-3 once version compat resolved)
  build_runner: ^2.4.12
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Testing
  mockito: ^5.4.4
  http_mock_adapter: ^0.6.1

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
